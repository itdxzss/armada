spring:
  application:
    name: armada-api
  jackson:
    default-property-inclusion: non_null
  datasource:
    url: ${DB_URL:jdbc:mysql://localhost:3306/armada?useSSL=false&serverTimezone=UTC}
    username: ${DB_USER:root}
    password: ${DB_PASSWORD:}
    driver-class-name: com.mysql.cj.jdbc.Driver
  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true
  kafka:
    bootstrap-servers: ${KAFKA_BOOTSTRAP_SERVERS:localhost:9092}
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.springframework.kafka.support.serializer.JsonSerializer
      properties:
        spring.json.add.type.headers: false

mybatis-plus:
  mapper-locations: classpath*:mapper/**/*.xml
  configuration:
    map-underscore-to-camel-case: true

server:
  port: 8080

armada:
  # 协议层连接配置。默认连本机 armada-protocol;测试/部署环境按 yml 覆盖。
  protocol:
    base-url: http://localhost:3000
    api-key: ""
    connect-timeout-ms: 3000
    read-timeout-ms: 60000
    command-publisher:
      send-timeout-ms: ${PROTOCOL_COMMAND_SEND_TIMEOUT_MS:10000}
    command-dispatcher:
      immediate-enabled: ${PROTOCOL_COMMAND_DISPATCH_IMMEDIATE_ENABLED:true}
      batch-size: ${PROTOCOL_COMMAND_DISPATCH_BATCH_SIZE:100}
      max-batches-per-drain: ${PROTOCOL_COMMAND_DISPATCH_MAX_BATCHES_PER_DRAIN:5}
      max-retry-count: ${PROTOCOL_COMMAND_DISPATCH_MAX_RETRY_COUNT:3}
      retry-delay-ms: ${PROTOCOL_COMMAND_DISPATCH_RETRY_DELAY_MS:30000}
      locked-timeout-ms: ${PROTOCOL_COMMAND_DISPATCH_LOCKED_TIMEOUT_MS:60000}
      scheduler:
        enabled: ${PROTOCOL_COMMAND_DISPATCH_SCHEDULER_ENABLED:true}
        fixed-delay-ms: ${PROTOCOL_COMMAND_DISPATCH_SCHEDULER_FIXED_DELAY_MS:10000}
  # 先测阶段统一登录密码(临时垫片,JWT 接上后删除);可用环境变量 DEV_LOGIN_PASSWORD 覆盖。
  dev-login:
    password: ${DEV_LOGIN_PASSWORD:armada123}
